name: CD — Deploy a Producción

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  SUPABASE_CLI_VERSION: "2.75.0"

jobs:
  # ─── Gate: CI debe pasar primero ────────────────────────────────
  ci:
    name: Validación CI
    uses: ./.github/workflows/ci.yml

  # ─── Deploy migraciones a producción ────────────────────────────
  deploy-migrations:
    name: Deploy Migraciones
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Link al proyecto de producción
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Aplicar migraciones pendientes
        run: supabase db push

      - name: Verificar estado de migraciones
        run: supabase migration list

  # ─── Deploy Edge Functions ──────────────────────────────────────
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Link al proyecto de producción
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Edge Functions
        run: |
          FUNCTIONS_DIR="supabase/functions"
          FUNCTION_COUNT=$(find "$FUNCTIONS_DIR" -mindepth 1 -maxdepth 1 -type d ! -name '_shared' 2>/dev/null | wc -l)

          if [ "$FUNCTION_COUNT" -gt 0 ]; then
            supabase functions deploy
            echo "✅ $FUNCTION_COUNT función(es) desplegada(s)"
          else
            echo "⏭️ No hay Edge Functions para desplegar — skipping"
          fi

  # ─── Notificación de deploy ─────────────────────────────────────
  notify:
    name: Resumen del Deploy
    runs-on: ubuntu-latest
    needs: [deploy-migrations, deploy-functions]
    if: always()
    steps:
      - name: Resumen
        run: |
          echo "## Deploy a Producción" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Componente | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-migrations.result }}" == "success" ]; then
            echo "| Migraciones | Exitoso |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Migraciones | Falló |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-functions.result }}" == "success" ]; then
            echo "| Edge Functions | Exitoso |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Edge Functions | Falló |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Autor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-migrations.result }}" != "success" ] || [ "${{ needs.deploy-functions.result }}" != "success" ]; then
            echo "Deploy falló — revisa los logs arriba"
            exit 1
          fi

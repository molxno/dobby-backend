name: CD — Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  # Do NOT cancel in-progress deploys — cancelling a running `supabase db push`
  # could leave the database in a partially-migrated state.
  cancel-in-progress: false

env:
  SUPABASE_CLI_VERSION: "2.75.0"

jobs:
  # ─── Gate: CI must pass first ──────────────────────────────────
  ci:
    name: CI Validation
    uses: ./.github/workflows/ci.yml

  # ─── Deploy migrations to production ───────────────────────────
  deploy-migrations:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Link to production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply pending migrations
        run: supabase db push

      - name: Verify migration status
        run: supabase migration list

  # ─── Deploy Edge Functions (runs AFTER migrations to ensure schema is up to date) ───
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [ci, deploy-migrations]  # Sequential: migrations must complete before functions
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Link to production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Edge Functions
        run: |
          FUNCTIONS_DIR="supabase/functions"
          FUNCTION_COUNT=$(find "$FUNCTIONS_DIR" -mindepth 1 -maxdepth 1 -type d ! -name '_shared' 2>/dev/null | wc -l)

          if [ "$FUNCTION_COUNT" -gt 0 ]; then
            supabase functions deploy
            echo "✅ $FUNCTION_COUNT function(s) deployed"
          else
            echo "⏭️ No Edge Functions to deploy — skipping"
          fi

  # ─── Deploy notification ───────────────────────────────────────
  notify:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy-migrations, deploy-functions]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Deploy to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-migrations.result }}" == "success" ]; then
            echo "| Migrations | Success |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Migrations | Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-functions.result }}" == "success" ]; then
            echo "| Edge Functions | Success |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Edge Functions | Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-migrations.result }}" != "success" ] || [ "${{ needs.deploy-functions.result }}" != "success" ]; then
            echo "Deploy failed — check the logs above"
            exit 1
          fi

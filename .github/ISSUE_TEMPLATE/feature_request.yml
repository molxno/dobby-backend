name: "Feature Request"
description: "Propose a new feature for the backend"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Please describe your idea in as much detail as possible.

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      description: "Select the area of the feature"
      options:
        - New table
        - Modification to existing schema
        - New RLS policy
        - New trigger / function
        - New Edge Function
        - Performance improvement (indexes, queries)
        - Auth / Security
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe the feature you are proposing"
      placeholder: |
        Add a `categories` table so users can create custom expense categories instead of using only the predefined ones.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "Motivation"
      description: "Why do we need this feature? What problem does it solve?"
      placeholder: |
        Currently, expense categories are hardcoded in the frontend. Users have requested the ability to create their own categories to better fit their lifestyle.
    validations:
      required: true

  - type: textarea
    id: proposed_schema
    attributes:
      label: "Proposed schema (optional)"
      description: "If you have an idea for the SQL schema, share it here"
      render: sql
      placeholder: |
        CREATE TABLE categories (
          id text PRIMARY KEY,
          user_id uuid REFERENCES profiles ON DELETE CASCADE NOT NULL,
          name text NOT NULL,
          icon text DEFAULT '',
          color text DEFAULT '#666',
          created_at timestamptz DEFAULT now()
        );
    validations:
      required: false

  - type: textarea
    id: considerations
    attributes:
      label: "Considerations"
      description: "Anything we should keep in mind? (RLS, migrations, frontend compatibility, etc.)"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "I have checked that no similar issue is already open"
          required: true
        - label: "I am willing to contribute a PR for this feature"
          required: false

name: "Bug Report"
description: "Report a bug in the database, RLS, triggers, or Edge Functions"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this bug. Please fill in the details so we can investigate.

  - type: dropdown
    id: area
    attributes:
      label: "Affected area"
      description: "Select the area where the bug occurs"
      options:
        - Schema (tables, columns, types)
        - RLS (security policies)
        - Triggers / Functions
        - Edge Functions
        - Auth (authentication)
        - Migrations
        - Seed data
        - Other
    validations:
      required: true

  - type: input
    id: table
    attributes:
      label: "Affected table/function"
      description: "Name of the table, function, or trigger involved"
      placeholder: "e.g.: profiles, delete_user_account(), incomes_updated_at"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: "Bug description"
      description: "Describe what is happening and what you expected to happen"
      placeholder: |
        **What happens:** When inserting an expense with payment_method='nequi', there is no error but the row is not saved either.
        **What I expected:** It should reject the value with a CHECK constraint error.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "Steps to reproduce"
      description: "SQL query or steps to reproduce the bug"
      placeholder: |
        1. Start local Supabase: `npm run dev`
        2. Run in SQL Editor:
        ```sql
        INSERT INTO expenses (id, user_id, name, payment_method)
        VALUES ('test', 'uuid-here', 'Test', 'nequi');
        ```
        3. Observe the result
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: "Error or actual result"
      description: "Copy the exact error or describe the result"
      render: shell
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: "Environment"
      options:
        - Local (supabase start)
        - Production (Supabase hosted)
        - Both
    validations:
      required: true
